services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: quizshow_dev
      POSTGRES_USER: quizshow
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    env_file: .env
    depends_on:
      - db

volumes:
  postgres_data: